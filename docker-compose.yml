services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinical-trial-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinical-trial-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
